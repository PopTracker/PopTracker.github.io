name: Build and deploy pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Test when opening a PR (see 'if' in deploy step)
  pull_request:
    branches: ["main"]

  # Allow to trigger from outside
  repository_dispatch:
    types: ["deploy"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "pages-${{ github.event.number }}"
  cancel-in-progress: true

# Permissions only needed for deploy
permissions: {}

jobs:
  # Check for typos job
  codespell:
    runs-on: ubuntu-latest
    name: Find typos

    steps:
    - uses: actions/checkout@v6.0.3
    - uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579  # v2.2
      with:
        check_filenames: true
        check_hidden: true

  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      PR: "${{ github.event.number }}"  # for debugging
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Checkout PopTracker
        uses: actions/checkout@v6.0.3
        with:
          repository: black-sliver/PopTracker
          path: .poptracker
          submodules: true
      - name: Copy from PopTracker to pages
        run: |
          cp -R .poptracker/schema schema
          cp -R .poptracker/doc doc
      - name: Create schema indices
        run: |
          cd schema
          for d in */; do \
            echo -e "# ${d%/} Schema\n" > $d/index.md; \
            cd "$d"; \
            for f in *; do \
                [ "$f" != "index.md" ] && echo "* [$f]($f)" >> index.md; \
            done; \
            for e in */; do \
              if [ -d "$e" ]; then
                echo -e "# ${d%/} ${e%/} Schema\n" > $e/index.md; \
                cd "$e"
                for f in *; do \
                  [ "$f" != "index.md" ] && echo "* [$f]($f)" >> index.md; \
                done; \
                cd ..; \
              fi; \
            done; \
            cd ..; \
          done
          cd ..
      - name: Populate _data
        run: |
          pip install -r .github/requirements.txt
          python .github/make_data.py
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1.0.13
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5.0.0

  # Deployment job
  deploy:
    # Skip job for PR (testing only)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - codespell
      - build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
